apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  chart:
    spec:
      chart: loki-stack
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
      version: "2.10.2"
  interval: 1h
  values:
    loki:
      persistence:
        enabled: true
        size: 2Gi
      config:
        limits_config:
          volume_enabled: true
    promtail:
      enabled: true
    grafana:
      enabled: false # We already have Grafana from kube-prometheus-stack
    prometheus:
      enabled: false # We already have Prometheus
