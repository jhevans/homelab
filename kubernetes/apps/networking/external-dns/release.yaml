apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: networking
spec:
  interval: 1h
  chart:
    spec:
      chart: external-dns
      version: "1.15.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: networking
  values:
    provider: webhook # Use the webhook translator
    env:
      - name: EXTERNAL_DNS_WEBHOOK_PROVIDER_URL
        value: http://localhost:8888
    extraArgs:
      - --webhook-provider-url=http://localhost:8888
    # Add the AdGuard Webhook Sidecar
    extraContainers:
      - name: adguard-webhook
        image: ghcr.io/muhlba91/external-dns-provider-adguard:v0.6.0
        ports:
          - containerPort: 8888
            name: webhook
        env:
          - name: ADGUARD_URL
            value: http://adguard-home.networking.svc.cluster.local
          - name: ADGUARD_USER
            value: admin
          - name: ADGUARD_PASSWORD
            value: admin # Update this if you changed it in the wizard
          - name: LOG_LEVEL
            value: info
    policy: sync
    registry: txt
    txtOwnerId: homelab-sandbox
    domainFilters:
      - lab.local
    sources:
      - ingress
