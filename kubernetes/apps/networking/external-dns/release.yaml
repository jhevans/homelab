apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: networking
spec:
  interval: 1h
  chart:
    spec:
      chart: external-dns
      version: "1.15.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: networking
  values:
    provider:
      name: webhook
    webhook:
      image:
        repository: ghcr.io/muhlba91/external-dns-provider-adguard
        tag: v0.6.0
      env:
        - name: ADGUARD_URL
          value: http://adguard-home.networking.svc.cluster.local
        - name: ADGUARD_USER
          value: admin
        - name: ADGUARD_PASSWORD
          value: admin # Update this if you changed it in the wizard
      port: 8888
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8888
      readinessProbe:
        httpGet:
          path: /healthz
          port: 8888
    policy: sync
    registry: txt
    txtOwnerId: homelab-sandbox
    domainFilters:
      - lab.local
    sources:
      - ingress
