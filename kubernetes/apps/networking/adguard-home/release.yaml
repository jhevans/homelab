apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: adguard-home
  namespace: networking
spec:
  interval: 1h
  chart:
    spec:
      chart: adguard-home
      version: 0.3.25
      sourceRef:
        kind: HelmRepository
        name: gabe565
        namespace: networking
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    service:
      main:
        ports:
          http:
            port: 80
    persistence:
      config:
        enabled: true
        type: emptyDir
      data:
        enabled: true
        type: emptyDir
