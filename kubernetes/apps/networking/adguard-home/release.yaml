apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: adguard-home
  namespace: networking
spec:
  interval: 30m
  chart:
    spec:
      chart: adguard-home
      version: 0.3.25
      sourceRef:
        kind: HelmRepository
        name: gabe565
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # AdGuard Home specific values
    # The gabe565 chart uses the bjw-s app-template structure
    controllers:
      main:
        strategy: RollingUpdate
        containers:
          main:
            image:
              repository: adguard/adguardhome
              tag: v0.107.73
    service:
      main:
        controller: main
        ports:
          http:
            port: 3000
      dns-udp:
        enabled: true
        controller: main
        type: LoadBalancer
        # The chart already defines the ports, we just ensure it is a LoadBalancer
    persistence:
      config:
        enabled: true
        type: emptyDir
      data:
        enabled: true
        type: emptyDir
