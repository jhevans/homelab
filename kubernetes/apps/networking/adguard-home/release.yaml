apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: adguard-home
  namespace: networking
spec:
  interval: 1h
  chart:
    spec:
      chart: adguard-home
      version: 0.3.25
      sourceRef:
        kind: HelmRepository
        name: gabe565
        namespace: networking
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    controllers:
      main:
        strategy: RollingUpdate
        containers:
          main:
            image:
              repository: adguard/adguardhome
              tag: v0.107.56
    service:
      main:
        controller: main
        ports:
          http:
            port: 80
      dns-tcp:
        controller: main
        type: LoadBalancer
        loadBalancerIP: 192.168.68.10
        ports:
          dns:
            port: 53
            protocol: TCP
      dns-udp:
        controller: main
        type: LoadBalancer
        loadBalancerIP: 192.168.68.10
        ports:
          dns:
            port: 53
            protocol: UDP
    persistence:
      config:
        enabled: true
        type: pvc
        storageClass: local-path
        accessMode: ReadWriteOnce
        size: 1Gi
      data:
        enabled: true
        type: pvc
        storageClass: local-path
        accessMode: ReadWriteOnce
        size: 1Gi
