apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: adguard-home
  namespace: networking
spec:
  interval: 1h
  chart:
    spec:
      chart: adguard-home
      version: 0.3.25
      sourceRef:
        kind: HelmRepository
        name: gabe565
        namespace: networking
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # AdGuard Home specific values
    # The gabe565 chart uses the bjw-s app-template structure
    controllers:
      main:
        strategy: RollingUpdate
        containers:
          main:
            image:
              repository: adguard/adguardhome
              tag: v0.107.73
    service:
      main:
        controller: main
        type: LoadBalancer # Ready for MetalLB on Mini-PC
        ports:
          http:
            port: 80
          dns-tcp:
            enabled: true
            port: 53
            protocol: TCP
          dns-udp:
            enabled: true
            port: 53
            protocol: UDP
    persistence:
      config:
        enabled: true
        type: emptyDir
      data:
        enabled: true
        type: emptyDir
    # Explicitly override probes to use port 80
    probes:
      liveness:
        enabled: true
        custom: true
        spec:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 1
          failureThreshold: 3
      readiness:
        enabled: true
        custom: true
        spec:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 1
          failureThreshold: 3
      startup:
        enabled: true
        custom: true
        spec:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 1
          failureThreshold: 30
