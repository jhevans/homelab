apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: emonhp
  namespace: networking
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: emonhp.lab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: emonhp
                port:
                  number: 80
