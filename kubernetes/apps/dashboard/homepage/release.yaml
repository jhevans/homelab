apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: dashboard
spec:
  chart:
    spec:
      chart: homepage
      sourceRef:
        kind: HelmRepository
        name: homepage
        namespace: dashboard
      version: "2.0.0"
  interval: 1h
  values:
    enableRbac: true
    config:
      kubernetes:
        mode: cluster
      services:
        - Networking:
            - AdGuard Home:
                icon: adguard-home.png
                href: http://adguard.lab.local
                description: DNS Sinkhole & AdBlocker
        - Monitoring:
            - Headlamp:
                icon: headlamp.png
                href: http://headlamp.lab.local
                description: Kubernetes Dashboard
            - Grafana:
                icon: grafana.png
                href: http://grafana.lab.local
                description: Metrics & Dashboards
            - Uptime Kuma:
                icon: uptime-kuma.png
                href: http://status.lab.local
                description: Service Status Page
        - AI:
            - Open WebUI:
                icon: open-webui.png
                href: http://ai.lab.local
                description: Local LLM Interface
            - Ollama (CPU):
                icon: ollama.png
                href: http://ollama.lab.local
                description: AI Backend (CPU)
        - Development:
            - Forgejo:
                icon: forgejo.png
                href: http://forgejo.lab.local
                description: Internal Git Forge
      bookmarks:
        - Developer:
            - Github:
                - abbr: GH
                  href: https://github.com/jhevans/homelab        
        - Entertainment:
            - YouTube:
                - abbr: YT
                  href: https://youtube.com/
        - Productivity:
            - Gemini:
                - abbr: GI
                  href: https://gemini.google.com/
      widgets:
        - datetime:
            text_size: xl
            format:
              timeStyle: short
        - kubernetes:
            cluster:
              show: true
              cpu: true
              memory: true
              showLabel: true
              label: "homelab"
            nodes:
              show: true
              cpu: true
              memory: true
              showLabel: true
    ingress:
      main:
        enabled: true
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: web
        hosts:
          - host: lab.local
            paths:
              - path: /
                pathType: Prefix
