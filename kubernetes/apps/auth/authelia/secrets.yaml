apiVersion: v1
kind: Secret
metadata:
  name: authelia-secrets
  namespace: auth
stringData:
  jwt_secret: "my-jwt-secret-placeholder"
  session_secret: "my-session-secret-placeholder"
  storage_encryption_key: "my-storage-encryption-key-placeholder"
  # Keys expected by the 0.9.1 chart's internal mounts
  identity_validation.reset_password.jwt.hmac.key: "my-jwt-secret-placeholder"
  session.encryption.key: "my-session-secret-placeholder"
  storage.encryption.key: "my-storage-encryption-key-placeholder"
