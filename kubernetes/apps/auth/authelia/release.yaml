apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authelia
  namespace: auth
spec:
  interval: 15m
  chart:
    spec:
      chart: authelia
      version: 0.9.1
      sourceRef:
        kind: HelmRepository
        name: authelia
        namespace: auth
  values:
    domain: lab.local
    secret:
      existingSecret: authelia-secrets # Use our secret
    configMap:
      access_control:
        default_policy: one_factor
      authentication_backend:
        file:
          path: /config/users.yml
      storage:
        local:
          path: /config/db.sqlite3
      notifier:
        filesystem:
          filename: /config/notification.txt
    
    # We mount users.yml manually
    volumes:
      - name: users-db
        configMap:
          name: authelia-users
    volumeMounts:
      - name: users-db
        mountPath: /config/users.yml
        subPath: users.yml
        readOnly: true

    persistence:
      enabled: true
      size: 1Gi
      storageClass: local-path
    ingress:
      enabled: false
