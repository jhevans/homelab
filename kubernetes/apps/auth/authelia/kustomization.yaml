apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: auth
resources:
  - repository.yaml
  - release.yaml
  - middleware.yaml
  - secrets.yaml
  - ingress.yaml

configMapGenerator:
  - name: authelia-users
    files:
      - users.yml
  - name: authelia-config
    files:
      - configuration.yaml
