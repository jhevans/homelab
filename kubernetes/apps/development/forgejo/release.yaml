apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: development
spec:
  interval: 1h
  chart:
    spec:
      chart: forgejo
      version: "16.2.0"
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: development
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Disable built-in postgresql to avoid pgpool errors (using sqlite3)
    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false
    # Disable built-in redis to avoid image pull errors
    redis:
      enabled: false
    redis-cluster:
      enabled: false
    # Basic configuration for Forgejo
    gitea:
      config:
        APP_NAME: "Forgejo: Home Lab"
        RUN_MODE: prod
        server:
          DOMAIN: forgejo.lab.local
          ROOT_URL: "http://forgejo.lab.local/"
          SSH_PORT: 2222
        database:
          DB_TYPE: sqlite3
    service:
      http:
        port: 3000
    persistence:
      enabled: true
      size: 5Gi
